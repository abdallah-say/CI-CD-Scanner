name: DevSecOps Automated Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  security_audit:
    name: Automated Vulnerability Assessment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Audit Repository Dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          format: "table"
          exit-code: "1" # This forces the pipeline to crash and fail if vulnerabilities are found
          severity: "CRITICAL,HIGH"

      - name: Build Local Test Image
        run: docker build -t cloudsec-app:test .
      - name: Audit Compiled Docker Container
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "cloudsec-app:test"
          format: "table"
          exit-code: "1" # Fails the pipeline if the base container layers are insecure
          severity: "CRITICAL,HIGH"
